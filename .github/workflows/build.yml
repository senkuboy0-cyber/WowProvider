name: Build & Deploy CloudStream Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.13

      - name: Build Extensions
        run: gradle make

      - name: Prepare builds folder
        run: |
          mkdir -p builds
          cat > builds/repo.json << 'JSON'
          {
            "name": "Wow Provider",
            "description": "Wow.xxx - Free Porn Videos",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/senkuboy0-cyber/WowProvider/builds/plugins.json"
            ]
          }
          JSON
          cp WowProvider/build/WowProvider.cs3 builds/
          cat > builds/plugins.json << 'JSON'
          [
            {
              "url": "https://raw.githubusercontent.com/senkuboy0-cyber/WowProvider/builds/WowProvider.cs3",
              "internalName": "WowProvider",
              "tvTypes": ["Movie", "TvSeries", "Others"],
              "language": "en",
              "name": "Wow",
              "authors": ["senkuboy0-cyber"],
              "version": 1,
              "description": "Wow.xxx - Free Porn Videos",
              "repositoryUrl": "https://github.com/senkuboy0-cyber/WowProvider",
              "status": 1
            }
          ]
          JSON

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: builds
          clean: true